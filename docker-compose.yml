services:
    rsshub:
        image: franksun123/rsshub
        restart: always
        ports:
            - '1200:1200'
        environment:
            NODE_ENV: production
            FLARESOLVERR_URL: http://192.168.1.190:8191/v1
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:1200/healthz']
            interval: 30s
            timeout: 10s
            retries: 3
