version: '3.8'
services:
    rsshub:
        build:
            context: . # repo root when this compose file lives in the fork
            dockerfile: Dockerfile
        image: sunbi/rsshub:local
        restart: unless-stopped
        ports:
            - '127.0.0.1:1200:1200'
        environment:
            NODE_ENV: production
            CACHE_TYPE: redis
            CACHE_EXPIRE: 600
            REDIS_URL: redis://redis:6379/
            # Access control - only allow calls from your own services
            ACCESS_KEY: '${ACCESS_KEY}'
            ALLOW_LOCALHOST: 'true'
            # Channel avatars on SPEC YouTube routes (server-side only — never VITE_*)
            YOUTUBE_API_v3_KEY: '${YOUTUBE_API_v3_KEY}'
            # Netflix SPEC route uses TMDB bridge (imdb:pageConst + api.themoviedb.org)
            TMDB_API_KEY: '${TMDB_API_KEY}'
        # Naver auth (for cafe, etc.)
        # NAVER_COOKIE: "NID_AUT=...; NID_SES=..."
        depends_on:
            - redis
        networks:
            - sunbi-internal

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        volumes:
            - rsshub_redis:/data
        networks:
            - sunbi-internal

networks:
    sunbi-internal:
        name: sunbi-internal

volumes:
    rsshub_redis:
